- type: entity
  id: ActionEnterStasis
  name: "[color=red]Reviving Stasis[/color]"
  description: We fall into a stasis, allowing us to regenerate and trick our enemies.
  components:
  - type: Action
    useDelay: 120
    checkCanInteract: false
    checkConsciousness: false
    raiseOnAction: true
    icon:
      sprite: _UM/Interface/Actions/changeling.rsi
      state: fake_death
  - type: InstantAction
    event: !type:StasisEnterActionEvent
  - type: EnterStasisAction
  - type: ConfirmableAction
    popup: changeling-enter-stasis-confirm

- type: alert
  id: StasisRegenerating
  icons:
  - sprite: _UM/Interface/Actions/changeling.rsi
    state: fake_death
  name: changeling-in-stasis-name
  description: changeling-in-stasis-desc

- type: alert
  id: StasisReady
  clickEvent: !type:StasisReviveAlertEvent
  icons:
  - sprite: /Textures/_UM/Interface/Actions/changeling.rsi
    state: revive
  name: changeling-finished-stasis-alert-name
  description: changeling-finished-stasis-alert-desc
