- type: entity
  parent: BaseAction
  id: BaseActionSolutionInject
  abstract: true
  components:
  - type: Action
    useDelay: 60
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: _UM/Interface/Actions/changeling.rsi
      state: sting_mute
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:SolutionInjectActionEvent
    canTargetSelf: false
    whitelist:
      components:
      - MobState

- type: entity
  parent: BaseActionSolutionInject
  id: ActionStingMute
  name: Mute Sting
  description: We silently sting a human, completely silencing them for a short time. Does not provide a warning to the victim that they have been stung, until they try to speak and cannot. [color=red]Requires 20 Chemicals[/color]
  components:
  - type: Action
    useDelay: 60
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: _UM/Interface/Actions/changeling.rsi
      state: sting_mute
  - type: EnergyActionRequirement
    energyName: changeling
    fancyName: chemicals
    amount: 20
  - type: SolutionInjectAction
    solution:
      reagents:
      - ReagentId: MuteToxin
        Quantity: 6

- type: entity
  parent: BaseAction
  id: ActionExtractGenomeSting
  name: Extract DNA
  description: dna [color=red]Requires 20 Chemicals[/color]
  components:
  - type: Action
    useDelay: 60
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: _UM/Interface/Actions/changeling.rsi
      state: sting_extract
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:ExtractGenomeActionEvent
    whitelist:
      components:
      - MobState
  - type: ExtractGenomeAction
  - type: EnergyActionRequirement
    energyName: changeling
    fancyName: chemicals
    amount: 20

- type: entity
  parent: BaseAction
  id: ActionInjectGenomeSting
  name: Transformation Sting
  description: We silently sting an organism, injecting a retrovirus that forces them to transform. [color=red]Requires 20 Chemicals[/color]
  components:
  - type: Action
    useDelay: 60
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: _UM/Interface/Actions/changeling.rsi
      state: sting_transform
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:InjectGenomeActionEvent
    whitelist:
      components:
      - MobState
  - type: InjectGenomeAction
  - type: EnergyActionRequirement
    energyName: changeling
    fancyName: chemicals
    amount: 20
