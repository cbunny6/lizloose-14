- type: entity
  parent: BaseGameRule
  id: UMSubGamemodesRule
  components:
  - type: SubGamemodes
    rules:
    - id: Thief
      prob: 1.0
    - id: UMChangeling
      prob: 0.5
    - id: UMSubBroodmotherInfection
      prob: 0.5

- type: entity
  abstract: true
  parent: BaseGameRule
  id: UMBaseTraitorRule
  components:
  - type: TraitorRule
  # TODO: codewords in yml
  # TODO: uplink in yml
  - type: AntagRandomObjectives
    sets:
    - groups: TraitorObjectiveGroups
    maxDifficulty: 5
  - type: AntagSelection
    agentName: traitor-round-end-agent-name
  - type: DynamicRuleCost
    cost: 100

- type: entity
  parent: BaseTraitorRule
  id: UMTraitor
  components:
  - type: GameRule
    minPlayers: 5
    #delay:
    #  min: 240
    #  max: 420
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Traitor ]
      max: 1
      playerRatio: 5
      blacklist:
        components:
        - AntagImmune
      lateJoinAdditional: false
      mindRoles:
      - MindRoleTraitor

- type: entity
  id: UMChangeling
  parent: BaseGameRule
  components:
  - type: GameRule
    minPlayers: 20
  - type: AntagRandomObjectives
    sets:
    - groups: ChangelingObjectiveGroupsDevour
      prob: 0.5
      maxPicks: 2
    - groups: ChangelingObjectiveGroups
      prob: 1
      maxPicks: 2
    maxDifficulty: 6
  - type: AntagSelection
    agentName: changeling-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Changeling ]
      max: 2
      playerRatio: 16
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      briefing:
        text: changeling-role-greeting
        color: Red
        sound: /Audio/Ambience/Antag/changeling_start.ogg
      components:
      - type: ChangelingDevour
        changelingDevourAction: UMActionChangelingDevour
      - type: ChangelingIdentity
      - type: ChangelingTransform
        changelingTransformAction: UMActionChangelingTransform
      - type: ActionGrant
        actions:
        - UMActionChangelingStore #UM EDIT
        - ActionEnterStasis
      - type: UMChangeling
      - type: EnergyContainer
        types:
        - ChangelingChemicalEnergy
      - type: Store
        name: store-preset-name-changeling
        categories:
        - UMChangelingAbilities
        currencyWhitelist:
        - ChangelingDNA
        balance:
          ChangelingDNA: 15
      mindRoles:
      - MindRoleChangeling

- type: entity
  id: UMBroodmotherSwarm
  parent: BaseGameRule
  components:
  - type: GameRule
    minPlayers: 20
    delay:
      min: 600
      max: 960
  - type: AntagSelection
    agentName: broodmother-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Broodmother ]
      max: 4
      playerRatio: 10
      allowNonHumans: true
      briefing:
        text: broodmother-role-greeting
        color: Red
        sound: /Audio/Ambience/Antag/changeling_start.ogg
      components:
      - type: DeployableAntag
        protoId: MobBroodmother
      mindRoles:
      - MindRoleBroodmother

- type: entity
  id: UMBasicStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: UMBasicGameRulesTable

# event schedulers
- type: entityTable
  id: UMBasicGameRulesTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - !type:NestedSelector
      tableId: UMBasicCalmEventsTable
    - !type:NestedSelector
      tableId: CargoGiftsTable
    - !type:NestedSelector
      tableId: CalmPestEventsTable
