- type: entity
  abstract: true
  parent: BaseObjective
  id: UMBaseChangelingObjective
  components:
  - type: Objective
    issuer: objective-issuer-changeling
    difficulty: 1
  - type: RoleRequirement
    roles:
    - ChangelingRole

- type: entity
  parent: [UMBaseChangelingObjective, BaseCodeObjective]
  id: UMChangelingDevourObjective
  description: they have nice jeans
  components:
  - type: Objective
    difficulty: 1
    unique: false
    icon:
      sprite: Objects/Consumable/Food/burger.rsi
      state: plain
  - type: TargetObjective
    title: changeling-objective-condition-devour-person-title
  - type: PickRandomPerson
  - type: ChangelingDevourCondition

- type: entity
  parent: UMBaseChangelingObjective
  id: UMChangelingDevourCountObjective
  components:
  - type: Objective
    difficulty: 2
    unique: true
    icon:
      sprite: Objects/Consumable/Food/burger.rsi
      state: bigbite
  - type: NumberObjective
    min: 4
    max: 9
    title: objective-devour-count-title
    description: objective-devour-count-description
  - type: ChangelingDevourCondition
  - type: GenericCounter


- type: entity
  parent: [BaseChangelingObjective, BaseSurviveObjective]
  id: UMChangelingSurviveObjective
  name: Survive.
  description: We must stay alive at all cost.
  components:
  - type: Objective
    difficulty: 1
    unique: true
    icon:
      sprite: Mobs/Species/Human/organs.rsi
      state: heart-on
  - type: ObjectiveBlacklistRequirement
    blacklist:
      components:
      - EscapeShuttleCondition

- type: entity
  parent: [BaseChangelingObjective, BaseLivingObjective]
  id: UMChangelingEscapeShuttleObjective
  name: Escape to CentComm alive and unrestrained via the escape shuttle.
  description: Make it to CentComm so we can continue being evil and shit
  components:
  - type: Objective
    difficulty: 1.2
    unique: true
    icon:
      sprite: Structures/Furniture/chairs.rsi
      state: shuttle
  - type: ObjectiveBlacklistRequirement
    blacklist:
      components:
      - SurviveCondition
  - type: EscapeShuttleCondition
