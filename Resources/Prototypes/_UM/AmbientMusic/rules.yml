- type: rules
  id: UMNearEngineering
  rules:
  - !type:NearbyComponentsRule
    components:
    - type: UMAmbientMusicMarkerEngineering
    count: 3
    range: 5

- type: rules
  id: UMNearMedical
  rules:
  - !type:NearbyComponentsRule
    components:
    - type: UMAmbientMusicMarkerMedical
    count: 3
    range: 5

- type: rules
  id: UMNearDetective
  rules:
  - !type:NearbyComponentsRule
    components:
    - type: UMAmbientMusicMarkerDetective
    count: 3
    range: 5

- type: rules
  id: UMNearPrayable
  rules:
  - !type:NearbyComponentsRule
    anchored: true
    components:
    - type: Prayable
    range: 6

- type: rules
  id: UMNearSpookyFog
  rules:
  - !type:NearbyEntitiesRule
    count: 5
    whitelist:
      tags:
      - SpookyFog
    range: 4

- type: rules # only play if they're really deep in space
  id: UMInSpace
  rules:
  - !type:InSpaceRule
  - !type:IsGhostRule
    inverted: true
  - !type:GridInRangeRule
    inverted: true
    range: 7

- type: rules
  id: UMNearWeirdGrid
  rules:
  - !type:InSpaceRule
  #- !type:IsGhostRule
  #  inverted: true
  - !type:StationInRangeRule # play when near a grid that isn't the station
    inverted: true
    range: 5

- type: rules
  id: UMOnWeirdGrid
  rules:
  - !type:OnStationGridRule
    inverted: true

